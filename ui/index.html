<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Skybot Radar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
    <div id="app">
        <header id="top-bar">
            <h1>Skybot Radar</h1>
            <div id="mode-buttons">
                <button data-mode="chase">Chase</button>
                <button data-mode="broadcast">Broadcast</button>
                <button data-mode="analyst">Analyst</button>
            </div>
            <div id="controls">
                <span id="frame-label">NOAA Radar</span>
                <label>
                    Opacity
                    <input id="opacity-slider" type="range" min="0" max="1" step="0.05" value="0.85" />
                </label>
            </div>
        </header>
        <main id="main">
            <div id="map"></div>
        </main>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="./js/noaa_radar.js"></script>
    <script src="./js/city_labels.js"></script>
    <script src="./js/alerts_overlays.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
